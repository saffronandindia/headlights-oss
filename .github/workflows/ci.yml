name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Headlights packages (editable)
        run: |
          pip install -e ./chain
          pip install -e ./sdk-python
          pip install -e ./verifier
          pip install -e ./server

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx

      # Each package owns its own [tool.pytest.ini_options] in pyproject.toml
      # (testpaths = ["tests"]). Running pytest from the package directory
      # avoids the multiple-tests/-packages-on-sys.path collision that occurs
      # when pytest is run from the repo root.

      - name: Test chain
        working-directory: chain
        run: python -m pytest -q

      - name: Test sdk-python
        working-directory: sdk-python
        run: python -m pytest -q

      - name: Test verifier
        working-directory: verifier
        run: python -m pytest -q

      - name: Test server
        working-directory: server
        run: python -m pytest -q

      # Marketing is not a separately installable package; it imports from
      # chain and sdk-python directly. Per marketing/README.md the canonical
      # invocation is from the repo root with an explicit PYTHONPATH.
      - name: Test marketing
        env:
          PYTHONPATH: chain:sdk-python:.
        run: python -m pytest marketing/tests -q
